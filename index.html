Ora guardando l'intero file HTML la situazione è chiarissima. Nel codice che mi hai inviato hai una discrepanza tra la struttura del tag HTML e il Javascript:

1. Nell'HTML (riga 48) hai un tag **`<select id="loginSelect">`** (un menu a tendina classico) ed un pulsante con **`onclick="window.doLogin()"`**.
2. Nel Javascript (riga 168), però, la funzione `populateLoginDropdown()` provava a generare dei pulsanti (`<button class="team-btn">`) iniettandoli dentro il `select`. Questo rompeva la grafica e impediva al login di funzionare, e mancava del tutto la funzione `window._selectTeam`.

Dato che mi hai chiesto di rimettere la logica del login **com'era prima** (ovvero la selezione a griglia con i pulsanti grandi per ogni squadra), dobbiamo correggere sia il blocco HTML della schermata di login che le funzioni Javascript associate.

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// IMPORT DELLE PAGINE DALLA CARTELLA JS
import { HomePage } from './js/home.js';
import { CalendarioPage } from './js/calendario.js';
import { FormazionePage } from './js/formazione.js';
import { MercatoPage } from './js/mercato.js';
import { RosePage } from './js/rose.js';
import { StatsPage } from './js/stats.js';

const firebaseConfig = {
  databaseURL: "https://fantacapp-79d1c-default-rtdb.europe-west1.firebasedatabase.app"
};

const fapp = initializeApp(firebaseConfig);
const db = getDatabase(fapp);

// 1. INIZIALIZZAZIONE DELLO STATO GLOBALE
window.STATE = { user: null, teams: [], players: [], votes: {}, status: {}, matches: {}, currentCompetition: 'fantacazz' };

// 2. FUNZIONE PER ASCOLTARE I DATI SPECIFICI DEL TORNEO SELEZIONATO
function caricaDatiCompetizione(compId) {
  // Ascolta la Giornata Attuale e lo Stato della competizione specifica
  onValue(ref(db, `competitions/${compId}/status`), snap => { 
    window.STATE.status = snap.val() || { currentGW: 1 }; 
    refreshUI(); 
  });

  // Ascolta il Calendario Incontri della competizione specifica
  onValue(ref(db, `competitions/${compId}/matches`), snap => { 
    window.STATE.matches = snap.val() || {}; 
    refreshUI(); 
  });

  // Ascolta la Classifica e le Squadre della competizione specifica
  onValue(ref(db, `competitions/${compId}/teams`), snap => {
    const raw = snap.val() || {};
    window.STATE.teams = Object.values(raw).sort((a,b) => b.pts - a.pts);
    
    // Mantiene allineato l'utente loggato con la squadra corrispondente nella nuova competizione
    if (window.STATE.user) {
      const foundCurrentTeam = window.STATE.teams.find(t => t.id === window.STATE.user.id);
      if (foundCurrentTeam) {
        window.STATE.user = foundCurrentTeam;
      }
    }

    populateLoginDropdown();
    refreshUI();
  });
}

// 3. FUNZIONE GLOBALE INVOCATA AL CAMBIO DELLA COMBOBOX IN HOME
window._handleCompetitionChange = function(newCompetitionId) {
  window.STATE.currentCompetition = newCompetitionId;
  window.showToast(`Competizione: ${newCompetitionId.toUpperCase()}`, 'ok');
  
  // Svuota graficamente il select dei turni nel calendario per obbligarlo a rigenerarsi
  const calSelect = document.getElementById('calGwSelect');
  if (calSelect) {
    calSelect.innerHTML = '';
    delete calSelect.dataset.currentComp;
  }

  // Ri-scatena i listener puntando alla nuova competizione selezionata
  caricaDatiCompetizione(newCompetitionId);
};

// 4. FA PARTIRE IL PRIMO CARICAMENTO ALL'APERTURA DELL'APP (Default: 'fantacazz')
caricaDatiCompetizione(window.STATE.currentCompetition);

// 5. LISTENER GLOBALI COMUNI
onValue(ref(db, 'votes'), snap => { 
  window.STATE.votes = snap.val() || {}; 
  refreshUI(); 
});

onValue(ref(db, 'players'), snap => {
  window.STATE.players = Object.values(snap.val() || {});
  refreshUI();
});

// 6. LOGICA DI CARICAMENTO E CONTROLLO LOGIN RIPRISTINATA
function populateLoginDropdown() {
  // 1. CONTROLLO AUTO-LOGIN AUTOMATICO
  const savedUserId = localStorage.getItem('fantaUser');
  if (savedUserId) {
    const loggedInUser = window.STATE.teams.find(t => t.id === savedUserId);
    if (loggedInUser) {
      window.STATE.user = loggedInUser;
      if (document.getElementById('page-login').style.display !== 'none') {
        bootApp();
      } else {
        refreshUI();
      }
      return;
    }
  }

  // 2. RENDERING DELLA GRIGLIA PULSANTI ORIGINALE (Se non si è loggati)
  const grid = document.getElementById('loginSelect');
  if (!grid) return;

  grid.innerHTML = window.STATE.teams.map(t => `
    <button class="team-btn" onclick="window._selectTeam('${t.id}')">
      <span class="em">${t.emoji || '⚽'}</span>
      <span>${t.name}</span>
      <span class="own">${t.owner}</span>
    </button>
  `).join('');
}

// 7. AGGIUNTA DELLA FUNZIONE GLOBALE DI SELEZIONE DELLA GRIGLIA
window._selectTeam = function(id) {
  const t = window.STATE.teams.find(x => x.id === id);
  if (!t) return;
  
  window.STATE.user = t;
  localStorage.setItem('fantaUser', id); // Memorizza l'accesso sul browser
  bootApp(); // Inizializza ed entra nell'app
};

function bootApp() {
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('nav').style.display = 'flex';
  
  const container = document.getElementById('dynamic-pages-container');
  container.innerHTML = `
    ${HomePage.renderHTML()}
    ${CalendarioPage.renderHTML()}
    ${FormazionePage.renderHTML()}
    ${MercatoPage.renderHTML()}
    ${RosePage.renderHTML()}
    ${StatsPage.renderHTML()}
  `;
  window.goPage('home', document.querySelector('.nav-btn'));
  refreshUI();
}

function refreshUI() {
  if (!window.STATE.user || !document.getElementById('page-home')) return;
  HomePage.render(window.STATE);
  CalendarioPage.render(window.STATE);
  FormazionePage.render(window.STATE);
  MercatoPage.render(window.STATE);
  RosePage.render(window.STATE, window.STATE.user.id);
  StatsPage.render(window.STATE);
}

window.goPage = function(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const target = document.getElementById('page-'+name);
  if(target) target.classList.add('active');
  if(btn) btn.classList.add('active');
};

window.showToast = function(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2600);
};

window._saveNode = (path, payload) => set(ref(db, path), payload);
</script>
