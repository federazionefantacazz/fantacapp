<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fantacazz">
<link rel="manifest" href="manifest.json">
<link class="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Fantacazz</title>
<style>
:root {
  --bg: #1a1e24;       /* Sfondo principale */
  --bg2: #22272f;      /* Sfondo secondario */
  --bg3: #2b323c;      /* Sfondo elementi terziari */
  --card: #282e37;     /* Sfondo card */
  --accent: #50e3c2;   /* Verde acqua */
  --accent2: #4a90e2;  /* Blu primario */
  --accent3: #ff6b6b;  /* Rosso */
  --gold: #f5a623;     /* Giallo oro */
  --text: #f5f6f7;     /* Testo chiaro principale */
  --text2: #a0aab5;    /* Testo grigio chiaro */
  --text3: #626e7a;    /* Testo grigio scuro */
  --border: rgba(255, 255, 255, 0.05); /* Bordi sottili semi-trasparenti */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
body { font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* Schermata Login Auth */
#auth-container { display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:2rem; background:var(--bg); position:fixed; inset:0; z-index:999; }
.auth-box { width:100%; max-width:340px; background:var(--card); padding:2rem 1.5rem; border-radius:16px; border:1px solid var(--border); text-align:center; box-shadow:0 12px 40px rgba(0,0,0,0.3); }
.input-auth { width:100%; padding:.75rem 1rem; margin-bottom:1rem; border-radius:8px; border:1px solid var(--border); background:var(--bg2); color:#fff; font-size:.9rem; text-align:center; outline:none; transition:border-color .2s; }
.input-auth:focus { border-color:var(--accent); }
.btn-auth { width:100%; padding:.75rem; border-radius:8px; border:none; background:var(--accent); color:#0a0f1e; font-weight:600; font-size:.95rem; cursor:pointer; }

/* Layout Principale App */
#app-container { display:none; flex-direction:column; height:100vh; width:100%; padding-top:var(--safe-top); padding-bottom:var(--safe-bottom); }

/* Header Superiore */
.header-bar { display:flex; align-items:center; background:var(--bg2); border-bottom:1px solid var(--border); height:56px; padding:0 1rem; gap:.75rem; flex-shrink:0; }
.comp-select-wrapper { flex:1; position:relative; }
.comp-select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:.45rem .75rem; color:#fff; font-weight:500; font-size:.82rem; outline:none; -webkit-appearance:none; appearance:none; cursor:pointer; }
.comp-select-wrapper::after { content:'▼'; font-size:.65rem; color:var(--text2); position:absolute; right:.75rem; top:50%; transform:translateY(-50%); pointer-events:none; }

/* Contenitore Pagine Dinamiche */
#dynamic-pages-container { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 1rem; position:relative; }
.page { display:none; opacity:0; transform:translateY(6px); transition:all .25s ease-out; }
.page.active { display:block; opacity:1; transform:translateY(0); }

/* Classi Generiche Condivise */
.logo { font-family:'Bebas Neue', sans-serif; font-size:2.2rem; text-align:center; color:#fff; letter-spacing:1px; }
.sec { font-family:'Bebas Neue', sans-serif; font-size:1.4rem; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; margin-top:0.4rem; }
.card { background:var(--card); border-radius:14px; border:1px solid var(--border); padding:1.25rem; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.card-sm { padding:.85rem 1rem; border-radius:10px; }
.label { font-size:.7rem; text-transform:uppercase; font-weight:600; color:var(--text3); letter-spacing:0.5px; margin-bottom:.25rem; }

/* Player Cards & Badges */
.pcard { display:flex; align-items:center; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:.5rem .75rem; gap:.6rem; margin-bottom:.4rem; }
.rbadge { width:22px; height:22px; border-radius:4px; font-size:.7rem; font-weight:bold; display:flex; align-items:center; justify-content:center; color:#000; flex-shrink:0; }
.rP { background:#ffca28; } .rD { background:#42a5f5; color:#fff; } .rC { background:#66bb6a; } .rA { background:#ef5350; color:#fff; }
.pname { flex:1; font-size:.85rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff; }
.pclub { font-size:.7rem; color:var(--text3); margin-left:.25rem; text-transform:uppercase; }

/* Liste orizzontali e verticali scorrevoli */
.scroll-voti { display:flex; flex-direction:column; gap:0.1rem; max-height:260px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:2px; }

/* Bottom Navigazione */
.bottom-bar { display:flex; background:var(--bg2); border-top:1px solid var(--border); height:60px; flex-shrink:0; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; background:none; border:none; color:var(--text3); font-size:.68rem; font-weight:500; gap:.2rem; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.nav-btn svg { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
.nav-btn.active { color:var(--accent); font-weight:600; }
.nav-btn.active svg { transform:translateY(-1px); }

/* Toast */
.toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(100px); background:rgba(40,46,55,0.95); backdrop-filter:blur(8px); border:1px solid var(--border); padding:.6rem 1.2rem; border-radius:30px; font-size:.82rem; font-weight:500; box-shadow:0 10px 25px rgba(0,0,0,0.3); opacity:0; transition:all .3s cubic-bezier(0.175,0.885,0.32,1.275); z-index:9999; color:#fff; text-align:center; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.ok { border-bottom:2px solid var(--accent); }
.toast.err { border-bottom:2px solid var(--accent3); }

/* Select Rose speciali */
.select-rose { width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:#fff; padding:.65rem; outline:none; font-size:.88rem; font-weight:500; }
.mv-badge { font-family:'DM Mono',monospace; font-size:.78rem; font-weight:bold; padding:.15rem .4rem; border-radius:4px; margin-left:auto; }
.mv-up { background:rgba(80,227,194,0.12); color:var(--accent); }
.mv-dn { background:rgba(255,107,107,0.12); color:var(--accent3); }
</style>
</head>
<body>

<div id="auth-container">
  <div class="auth-box">
    <div class="logo" style="font-size:2.6rem; margin-bottom:1rem; letter-spacing:2px;">FANTACAZZ</div>
    <div class="label" style="margin-bottom:1rem;">Accesso Giocatore / Partecipante</div>
    <input type="email" id="authEmail" class="input-auth" placeholder="La tua Email">
    <input type="password" id="authPassword" class="input-auth" placeholder="La tua Password">
    <button class="btn-auth" id="authBtn">Entra nella Lega</button>
  </div>
</div>

<div id="app-container">
  <div class="header-bar">
    <div class="comp-select-wrapper">
      <select id="globalCompetitionSelect" class="comp-select" onchange="window.changeActiveCompetition(this.value)">
        </select>
    </div>
  </div>

  <div id="dynamic-pages-container"></div>

  <div class="bottom-bar">
    <button class="nav-btn active" onclick="window.goPage('home', this)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>Home
    </button>
    <button class="nav-btn" onclick="window.goPage('classifica', this)">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>Classifica
    </button>
    <button class="nav-btn" onclick="window.goPage('formazione', this)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>Schiera
    </button>
    <button class="nav-btn" onclick="window.goPage('rose', this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Rose
    </button>
    <button class="nav-btn" onclick="window.goPage('mercato', this)">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>Mercato
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { db, auth, ref, onValue, set } from './js/firebase-config.js';
import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

import { HomePage }       from './js/pages/home.js';
import { ClassificaPage } from './js/pages/classifica.js';
import { FormazionePage } from './js/pages/formazione.js';
import { MercatoPage }    from './js/pages/mercato.js';
import { RosePage }       from './js/pages/rose.js';
import { TeamsPage }      from './js/pages/teams.js';

// Stato centralizzato reattivo dell'applicazione PWA
window.STATE = {
  user: null,
  teams: [],
  players: [],
  competitions: [],
  activeCompetitionId: '',
  matches: {},
  votes: {},
  currentPage: 'home',
  currentRealGW: 0 // 🟢 STATO INIZIALE DELLA GIORNATA SERIE A REALE
};

// Intercettore di Autenticazione Centrale
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.STATE.user = { id: user.uid, email: user.email };
    document.getElementById('auth-container').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    setupStaticHTMLStructure();
    startFirebaseRealtimeSync();
  } else {
    window.STATE.user = null;
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('auth-container').style.display = 'flex';
  }
});

// Gestore click login manuale
document.getElementById('authBtn').addEventListener('click', () => {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPassword').value;
  if(!email || !pass) return showToast("Compila tutti i campi!", "err");
  
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => showToast("Bentornato in lega!", "ok"))
    .catch(err => showToast("Credenziali errate, riprova.", "err"));
});

window.doFirebaseLogout = function() {
  if(confirm("Vuoi disconnetterti dall'applicazione?")) {
    signOut(auth).then(() => window.location.reload());
  }
};

function setupStaticHTMLStructure() {
  const container = document.getElementById('dynamic-pages-container');
  if(!container || container.children.length > 0) return;

  container.innerHTML = `
    ${HomePage.renderHTML(window.STATE)}
    ${ClassificaPage.renderHTML()}
    ${FormazionePage.renderHTML()}
    ${RosePage.renderHTML()}
    ${MercatoPage.renderHTML()}
    ${TeamsPage.renderHTML()}
  `;
}

function startFirebaseRealtimeSync() {
  // 🟢 LIVE SYNC TURNI SERIE A REALE (DALLA DASHBOARD)
  onValue(ref(db, 'status/currentRealGW'), snap => {
    window.STATE.currentRealGW = snap.val() !== null ? parseInt(snap.val()) : 0;
    if (window.STATE.user) refreshUI();
  });

  onValue(ref(db, 'competitions'), snap => {
    const data = snap.val() || {};
    window.STATE.competitions = Object.values(data);
    
    const select = document.getElementById('globalCompetitionSelect');
    if(select && select.options.length === 0 && window.STATE.competitions.length > 0) {
      select.innerHTML = window.STATE.competitions.map(c => `<option value="${c.id}">${c.name.toUpperCase()}</option>`).join('');
      window.STATE.activeCompetitionId = window.STATE.competitions[0].id;
    }
    refreshUI();
  });

  onValue(ref(db, 'teams'), snap => {
    const data = snap.val() || {};
    window.STATE.teams = Object.values(data).sort((a,b) => (b.pts||0)-(a.pts||0));
    refreshUI();
  });

  onValue(ref(db, 'players'), snap => {
    const data = snap.val() || {};
    window.STATE.players = Object.values(data);
    refreshUI();
  });

  onValue(ref(db, 'matches'), snap => {
    window.STATE.matches = snap.val() || {};
    refreshUI();
  });

  onValue(ref(db, 'votes'), snap => {
    window.STATE.votes = snap.val() || {};
    refreshUI();
  });
}

window.changeActiveCompetition = function(compId) {
  window.STATE.activeCompetitionId = compId;
  showToast("Lega aggiornata", "info");
  refreshUI();
};

function refreshUI() {
  const current = window.STATE.currentPage;
  if (current === 'home') HomePage.render(window.STATE);
  else if (current === 'classifica') ClassificaPage.render(window.STATE);
  else if (current === 'formazione') FormazionePage.render(window.STATE);
  else if (current === 'mercato') MercatoPage.render(window.STATE);
  else if (current === 'rose') RosePage.render(window.STATE, window.STATE.user.id);
  else if (current === 'teams') TeamsPage.render(window.STATE);
}

window.goPage = function(name, btn) {
  if (name === 'teams' && typeof TeamsPage.backToTeamsList === 'function') {
    TeamsPage.backToTeamsList();
  }

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  const target = document.getElementById('page-' + name);
  if(target) {
    target.classList.add('active');
  }
  if(btn) btn.classList.add('active');
  
  const container = document.getElementById('dynamic-pages-container');
  if(container) container.scrollTop = 0;

  window.STATE.currentPage = name;
  refreshUI();
};

window.showToast = function(msg, type='ok') {
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2600);
};

window._saveNode = (path, payload) => set(ref(db, path), payload);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
