<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fantacazz">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Fantacazz</title>
<style>
:root{\n  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2236;\n  --card:#141b2d;--card2:#1e2840;\n  --accent:#00e5a0;--accent2:#0077ff;--accent3:#ff4757;--gold:#f0b429;\n  --text:#f0f4ff;--text2:#8892a4;--text3:#4a5568;\n}\n*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}\nbody{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:calc(70px + env(safe-area-inset-bottom))}\n.app-header{display:flex;align-items:center;justify-content:between;padding:1.2rem 1rem .6rem;background:linear-gradient(to bottom, var(--bg), transparent)}\n.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;background:linear-gradient(45deg, #fff, var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}\n.sec{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.5px;color:var(--text);margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}\n.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem;margin-bottom:1rem;box-shadow:0 4px 20px rgba(0,0,0,0.2)}\n.card-sm{padding:.75rem 1rem}\n.label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600;margin-bottom:.2rem}\n.pcard{background:var(--card2);border-radius:12px;padding:.5rem .75rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}\n.rbadge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#fff;flex-shrink:0}\n.rP{background:#4a5568}\n.rD{background:#0077ff}\n.rC{background:#00e5a0;color:#0a0f1e}\n.rA{background:#ff4757}\n.pi{flex:1;min-width:0}\n.pn{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}\n.pm{font-size:.72rem;color:var(--text2)}\n.pr{text-align:right;flex-shrink:0}\n.price{font-size:.9rem;font-weight:600;font-family:'DM Mono',monospace;color:var(--gold)}\n.pavg{font-size:.68rem;color:var(--text2)}\n.btn{background:var(--accent2);color:#fff;border:none;padding:.7rem 1.2rem;border-radius:10px;font-size:.85rem;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;transition:all 0.2s}\n.btn-green{background:var(--accent);color:#0a0f1e;font-weight:600}\n.btn:active{opacity:0.8;transform:scale(0.98)}\n.tbl{width:100%;border-collapse:collapse}\n.tbl th{text-align:left;font-size:.7rem;text-transform:uppercase;color:var(--text2);padding:.6rem .4rem;font-weight:600}\n.tbl td{padding:.65rem .4rem;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,0.03)}\n.badge{padding:.2rem .4rem;border-radius:6px;font-size:.68rem;font-weight:600}\n.badge-green{background:rgba(0,229,160,0.1);color:var(--accent)}\n.badge-blue{background:rgba(0,119,255,0.1);color:var(--accent2)}\n.badge-red{background:rgba(255,71,87,0.1);color:var(--accent3)}\n.badge-gray{background:rgba(255,255,255,0.05);color:var(--text2)}\n.select-rose{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.6rem .9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}\n.nav-btn{font-size:.58rem !important}\n#nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom));background:rgba(17,24,39,0.85);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:around;padding-top:.5rem;padding-bottom:env(safe-area-inset-bottom);z-index:999}\n.nav-btn{background:none;border:none;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:.25rem;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:500;cursor:pointer;width:16%}\n.nav-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:all 0.2s}\n.nav-btn.active{color:var(--accent)}\n.nav-btn.active svg{transform:translateY(-2px)}\n.page{display:none;padding:0 1rem}\n.page.active{display:block;animation:fadeIn 0.25s ease-out}\n@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}\n.toast{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%) translateY(-40px);background:var(--card);border:1px solid var(--border);padding:.75rem 1.5rem;border-radius:12px;font-size:.85rem;font-weight:500;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;transition:all 0.3s ease;pointer-events:none}\n.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}\n.toast.ok{border-color:var(--accent);color:var(--accent)}\n.toast.err{border-color:var(--accent3);color:var(--accent3)}\n.mv-badge{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:600;padding:1px 4px;border-radius:4px;margin-left:.4rem}\n.mv-up{background:rgba(0,229,160,0.15);color:var(--accent)}\n.mv-dn{background:rgba(255,71,87,0.15);color:var(--accent3)}\n</style>
</head>
<body>

<div id="app">
  <div id="page-login" style="padding:3rem 2rem; text-align:center; max-width:400px; margin:40px auto 0;">
    <div class="logo" style="font-size:3rem; margin-bottom:2rem;">FANTACAZZ</div>
    <div class="card">
      <div class="label" style="margin-bottom:.5rem;">Seleziona la tua squadra</div>
      <select id="loginSelect" class="select-rose" style="margin-bottom:1.5rem; background:var(--bg2);">
        <option value="">Caricamento leghe...</option>
      </select>
      <button class="btn btn-green" style="width:100%; padding:.8rem;" onclick="window.doLogin()">Entra nell'App</button>
    </div>
  </div>

  <div id="dynamic-pages-container"></div>
</div>

<nav id="nav" style="display:none">
  <button class="nav-btn active" onclick="goPage('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </button>
  <button class="nav-btn" onclick="goPage('calendario',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendario
  </button>
  <button class="nav-btn" onclick="goPage('formazione',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>Formazione
  </button>
  <button class="nav-btn" onclick="goPage('mercato',this)">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.55L23 6H6"/></svg>Mercato
  </button>
  <button class="nav-btn" onclick="goPage('rose',this)">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>Rose
  </button>
  <button class="nav-btn" onclick="goPage('stats',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>Stats
  </button>
</nav>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update, set, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Importiamo le pagine esterne
import { HomePage } from './js/home.js';
import { CalendarioPage } from './js/calendario.js';
import { FormazionePage } from './js/formazione.js';
import { MercatoPage } from './js/mercato.js';
import { RosePage } from './js/rose.js';
import { StatsPage } from './js/stats.js';

const firebaseConfig = {
  databaseURL: "https://fantacazz-default-rtdb.europe-west1.firebasedatabase.app"
};

const fapp = initializeApp(firebaseConfig);
const db = getDatabase(fapp);

// Stato condiviso centrale
window.STATE = {
  user: null,
  teams: [],
  players: [],
  votes: {},
  status: {},
  matches: {}
};

// Sincronizzazione Firebase Realtime
onValue(ref(db,'status'), snap => { window.STATE.status = snap.val()||{}; refreshUI(); });
onValue(ref(db,'votes'), snap => { window.STATE.votes = snap.val()||{}; refreshUI(); });
onValue(ref(db,'matches'), snap => { window.STATE.matches = snap.val()||{}; refreshUI(); });

onValue(ref(db,'teams'), snap => {
  const raw = snap.val()||{};
  window.STATE.teams = Object.values(raw).sort((a,b)=>b.pts-a.pts);
  populateLoginDropdown();
  refreshUI();
});

onValue(ref(db,'players'), snap => {
  const raw = snap.val()||{};
  window.STATE.players = Object.values(raw);
  refreshUI();
});

function populateLoginDropdown() {
  const select = document.getElementById('loginSelect');
  if(!select || window.STATE.user) return;
  select.innerHTML = '<option value="">-- Chi sei? --</option>' + 
    window.STATE.teams.map(t=>`<option value="${t.id}">${t.emoji||'⚽'} ${t.name} (${t.owner})</option>`).join('');
  
  const saved = localStorage.getItem('fantaUser');
  if(saved) {
    const found = window.STATE.teams.find(t=>t.id===saved);
    if(found) { window.STATE.user = found; bootApp(); }
  }
}

window.doLogin = function() {
  const id = document.getElementById('loginSelect').value;
  if(!id) return;
  const found = window.STATE.teams.find(t=>t.id===id);
  if(found) {
    window.STATE.user = found;
    localStorage.setItem('fantaUser', id);
    bootApp();
  }
};

function bootApp() {
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('nav').style.display = 'flex';
  
  // Iniettiamo tutto l'HTML delle sottopagine
  const container = document.getElementById('dynamic-pages-container');
  container.innerHTML = `
    \${HomePage.renderHTML()}
    \${CalendarioPage.renderHTML()}
    \${FormazionePage.renderHTML()}
    \${MercatoPage.renderHTML()}
    \${RosePage.renderHTML()}
    \${StatsPage.renderHTML()}
  `;
  
  // Mostra la home di default
  window.goPage('home', document.querySelector('.nav-btn'));
  refreshUI();
}

function refreshUI() {
  if (!window.STATE.user) return;
  // Chiamiamo i metodi di render per aggiornare le pagine in tempo reale
  HomePage.render(window.STATE);
  CalendarioPage.render(window.STATE);
  FormazionePage.render(window.STATE);
  MercatoPage.render(window.STATE);
  RosePage.render(window.STATE, window.STATE.user.id);
  StatsPage.render(window.STATE);
}

window.goPage = function(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const target = document.getElementById('page-'+name);
  if(target) target.classList.add('active');
  if(btn) btn.classList.add('active');
};

window.showToast = function(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2600);
};

// Esponiamo i metodi di salvataggio critici ai moduli interni
window._dbRef = () => db;
window._saveNode = (path, payload) => set(ref(db, path), payload);
window._updateNode = (path, payload) => update(ref(db, path), payload);
</script>
</body>
</html>
