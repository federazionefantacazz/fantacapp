<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Fantacazz — Patron</title>
<style>
:root {
  --bg: #1a1e24;       
  --bg2: #22272f;      
  --bg3: #2b323c;      
  --card: #282e37;     
  --card2: #333a46;    
  --accent: #50e3c2;   
  --accent2: #4a90e2;  
  --accent3: #ff6b6b;  
  --gold: #f5a623;     
  --text: #f5f6f7;     
  --text2: #a0aab5;    
  --text3: #626e7a;    
  --border: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.5rem 0;display:flex;flex-direction:column;gap:.2rem}
.sidebar .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;padding:0 1.5rem;margin-bottom:1.5rem;color:#fff;display:flex;flex-direction:column}
.sidebar .logo span{font-size:.75rem;font-family:'DM Sans',sans-serif;color:var(--accent);letter-spacing:0;font-weight:600;text-transform:uppercase;margin-top:-4px}
.snav{background:none;border:none;color:var(--text2);padding:.8rem 1.5rem;text-align:left;font-size:.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:all .2s}
.snav:hover{background:rgba(255,255,255,0.03);color:#fff}
.snav.active{background:rgba(80,227,194,0.08);color:var(--accent);font-weight:600;border-left:3px solid var(--accent)}
.snav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sidebar-bottom{margin-top:auto;padding:0 1.5rem}
.sync-status{font-size:.75rem;color:var(--text2);background:var(--bg3);padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);text-align:center}

/* MAIN CONTENT */
.main-content{padding:2rem;overflow-y:auto;height:100vh}
.admin-sec{animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:1px;margin-bottom:1.5rem;color:#fff}

/* UTILS */
.card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-bottom:1.5rem}
.stat-box{background:var(--bg3);border-radius:8px;padding:1rem 1.25rem;border:1px solid var(--border);display:flex;flex-direction:column;gap:.25rem}
.stat-box .num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent)}
.label{font-size:.75rem;color:var(--text2);text-transform:uppercase;font-weight:600;letter-spacing:0.5px;margin-bottom:.3rem}
.input-login{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:#fff;padding:.65rem .75rem;font-size:.9rem;margin-bottom:1rem;transition:border-color .2s}
.input-login:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:.7rem 1rem;border-radius:6px;border:none;font-weight:600;font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;text-decoration:none}
.btn-green{background:var(--accent);color:#0a0f1e}
.btn-green:hover{background:#3cd6b4;transform:translateY(-1px)}
.btn-blue{background:var(--accent2);color:#fff}
.btn-blue:hover{background:#357abd}
.btn-red{background:var(--accent3);color:#fff}
.btn-red:hover{background:#ff5252}

/* TABLES */
.table-wrapper{overflow-x:auto;margin-top:.5rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3)}
table{width:100%;border-collapse:collapse;text-align:left;font-size:.85rem}
th{background:var(--card);color:var(--text2);font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:0.5px;padding:.75rem 1rem;border-bottom:1px solid var(--border)}
td{padding:.75rem 1rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.01)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600;text-transform:uppercase}
.badge-gray{background:rgba(160,170,181,0.1);color:var(--text2)}
.badge-blue{background:rgba(74,144,226,0.15);color:#4a90e2}
.badge-green{background:rgba(80,227,194,0.15);color:var(--accent)}
.badge-red{background:rgba(255,107,107,0.15);color:var(--accent3)}

/* VOTE GRID */
.vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-top:.5rem}
.vote-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between}
.vote-item .score{font-family:'DM Mono',monospace;font-weight:600;color:var(--accent);background:rgba(80,227,194,0.08);padding:.1rem .4rem;border-radius:4px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;border-radius:6px;background:var(--card);border:1px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,0.3);z-index:9999;font-size:.85rem;font-weight:500;transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--accent)}
.toast.err{border-left:4px solid var(--accent3)}
.toast.info{border-left:4px solid var(--accent2)}
</style>
</head>
<body>

<div class="layout">
  
  <div class="sidebar">
    <div class="logo">Fantacazz<span>Pannello Patron</span></div>
    
    <div style="padding: 0 1rem 1rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
      <label style="font-size: .7rem; color: var(--text2); text-transform: uppercase; font-weight: 600; display: block; margin-bottom: .4rem;">Competizione Attiva</label>
      <select id="adminCompSelect" style="width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: #fff; padding: .5rem; font-size: .85rem;" onchange="window._handleAdminCompChange(this.value)">
        <option value="">Caricamento competizioni...</option>
      </select>
    </div>

    <button class="snav active" onclick="showSec('dashboard',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <button class="snav" onclick="showSec('teams',this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Squadre
    </button>
    <button class="snav" onclick="showSec('players',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>Giocatori
    </button>
    <button class="snav" onclick="showSec('votes',this)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Voti GW
    </button>
    <button class="snav" onclick="showSec('sync',this)">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>SofaScore Sync
    </button>
    <button class="snav" onclick="showSec('mercato',this)">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Assegna Squadre
    </button>
    <button class="snav" onclick="showSec('classifica',this)">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Classifica
    </button>
    <button class="snav" onclick="showSec('calendar-gen',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Genera Calendario
    </button>
    <button class="snav" onclick="showSec('crea-competizioni',this)">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Nuova Competizione
    </button>

    <div class="sidebar-bottom">
      <div class="sync-status" id="syncStatus">⚪ Caricamento...</div>
    </div>
  </div>

  <div class="main-content" id="admin-sections-container">
    <!-- Le sezioni vengono iniettate qui da JS -->
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import { DashboardSection }    from './js/admin/dashboard.js';
import { TeamsSection }        from './js/admin/teams.js';
import { PlayersSection }      from './js/admin/players.js';
import { VotesSection }        from './js/admin/votes.js';
import { SyncSection }         from './js/admin/sync.js';
import { MercatoSection }      from './js/admin/mercato.js';
import { ClassificaSection }   from './js/admin/classifica.js';
import { CalendarioSection }   from './js/admin/calendario.js';
import { CompetizioniSection } from './js/admin/competizioni.js';

/* ─── Firebase ─────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyA6-PybCz_csan8tcrOEfgP8v3WKg1SIWY",
  authDomain: "fantcapp.firebaseapp.com",
  databaseURL: "https://fantcapp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fantcapp",
  storageBucket: "fantcapp.firebasestorage.app",
  messagingSenderId: "118817739792",
  appId: "1:118817739792:web:2dc599ae4bfb8769222695",
  measurementId: "G-DR0TJDVR2R"
};
const fapp = initializeApp(firebaseConfig);
const db = getDatabase(fapp);

/* ─── Stato globale admin ───────────────────────────────────────────────── */
let TEAMS = [];
let PLAYERS = [];
let VOTES = {};
let MATCHES = {};
let CURRENT_GW = 1;
let competitions = [];

let teamsCaricate = false;
let giocatoriCaricati = false;

window.CURRENT_COMPETITION = '';

/* ─── Bootstrap UI: inietta HTML di tutte le sezioni ───────────────────── */
const container = document.getElementById('admin-sections-container');
container.innerHTML = [
  DashboardSection,
  TeamsSection,
  PlayersSection,
  VotesSection,
  SyncSection,
  MercatoSection,
  ClassificaSection,
  CalendarioSection,
  CompetizioniSection,
].map(s => s.renderHTML()).join('');

/* ─── Status Firebase ───────────────────────────────────────────────────── */
const syncStatusEl = document.getElementById('syncStatus');
if (syncStatusEl) {
  syncStatusEl.innerHTML = "🟢 Connesso a Firebase";
  syncStatusEl.style.color = "var(--accent)";
}

/* ─── Helper: aggiorna tutte le sezioni con lo stato corrente ───────────── */
function refreshAll() {
  const state = { TEAMS, PLAYERS, VOTES, MATCHES, CURRENT_GW, competitions };
  DashboardSection.render(state);
  TeamsSection.render(state);
  PlayersSection.render(state);
  VotesSection.render(state);
  SyncSection.render(state);
  MercatoSection.render(state);
  ClassificaSection.render(state);
  CalendarioSection.render(state);
  CompetizioniSection.render(state);
}

/* ─── Navigazione sidebar ───────────────────────────────────────────────── */
window.showSec = function(secId, btnElement) {
  document.querySelectorAll('.admin-sec').forEach(sec => sec.style.display = 'none');
  const target = document.getElementById('sec-' + secId);
  if (target) target.style.display = 'block';
  document.querySelectorAll('.snav').forEach(btn => btn.classList.remove('active'));
  if (btnElement) btnElement.classList.add('active');
};

/* ─── Gestione competizione attiva ──────────────────────────────────────── */
function ascoltaDatiCompetizione(compId) {
  if (!compId) return;

  onValue(ref(db, `competitions/${compId}/status`), snap => {
    const statusData = snap.val() || {};
    CURRENT_GW = statusData.currentGW || 1;
    if (teamsCaricate && giocatoriCaricati) refreshAll();
  });

  onValue(ref(db, `competitions/${compId}/matches`), snap => {
    MATCHES = snap.val() || {};
    if (teamsCaricate && giocatoriCaricati) refreshAll();
  });
}

window._handleAdminCompChange = function(newCompId) {
  if (!newCompId) return;
  window.CURRENT_COMPETITION = newCompId;
  toast(`Pannello Admin spostato su: ${newCompId.toUpperCase()}`, 'info');
  ascoltaDatiCompetizione(newCompId);
};

/* ─── Listener Firebase ─────────────────────────────────────────────────── */
onValue(ref(db, 'competitions'), snap => {
  const comps = snap.val() || {};
  competitions = Object.values(comps);

  const adminSelect = document.getElementById('adminCompSelect');
  if (adminSelect) {
    if (competitions.length === 0) {
      adminSelect.innerHTML = `<option value="">⚠️ Nessuna competizione nel DB</option>`;
      window.CURRENT_COMPETITION = '';
    } else {
      if (!window.CURRENT_COMPETITION || !comps[window.CURRENT_COMPETITION]) {
        window.CURRENT_COMPETITION = competitions[0].id;
        ascoltaDatiCompetizione(window.CURRENT_COMPETITION);
      }
      adminSelect.innerHTML = competitions.map(c => `
        <option value="${c.id}" ${window.CURRENT_COMPETITION === c.id ? 'selected' : ''}>
          🏆 ${c.name || c.id}
        </option>
      `).join('');
    }
  }
  if (teamsCaricate && giocatoriCaricati) refreshAll();
});

onValue(ref(db, 'teams'), snap => {
  const raw = snap.val() || {};
  TEAMS = Object.values(raw).sort((a, b) => (b.pts || 0) - (a.pts || 0));
  teamsCaricate = true;
  if (teamsCaricate && giocatoriCaricati) refreshAll();
});

onValue(ref(db, 'players'), snap => {
  const raw = snap.val() || {};
  PLAYERS = Object.values(raw);
  giocatoriCaricati = true;
  if (window.CURRENT_COMPETITION) ascoltaDatiCompetizione(window.CURRENT_COMPETITION);
  if (teamsCaricate && giocatoriCaricati) refreshAll();
});

onValue(ref(db, 'votes'), snap => {
  VOTES = snap.val() || {};
  if (teamsCaricate && giocatoriCaricati) refreshAll();
});

/* ─── Azioni globali (chiamate dall'HTML delle sezioni) ─────────────────── */

window.filterPlayersAdmin = function(val) {
  PlayersSection.setFilter(val);
  PlayersSection.render({ PLAYERS });
};

window.changeGW = function(val) {
  CURRENT_GW = Math.max(1, CURRENT_GW + val);
  DashboardSection.render({ CURRENT_GW });
};

window.saveGW = async function() {
  try {
    await set(ref(db, `competitions/${window.CURRENT_COMPETITION}/status`), { currentGW: CURRENT_GW });
    toast('Giornata GW' + CURRENT_GW + ' salvata per ' + window.CURRENT_COMPETITION.toUpperCase(), 'ok');
  } catch (err) {
    toast("Errore nel salvataggio della GW", "err");
  }
};

window.addTeam = async function() {
  const id    = document.getElementById('tId').value.trim();
  const name  = document.getElementById('tName').value.trim();
  const owner = document.getElementById('tOwner').value.trim();
  const emoji = document.getElementById('tEmoji').value.trim();
  if (!id || !name) return toast("ID e Nome sono obbligatori!", "err");
  try {
    await set(ref(db, 'teams/' + id), { id, name, owner, emoji, pts: 0, lastGW: 0, w: 0, d: 0, l: 0 });
    toast("Squadra creata con successo!", "ok");
    ['tId','tName','tOwner','tEmoji'].forEach(f => document.getElementById(f).value = '');
  } catch (err) {
    toast("Errore durante la creazione", "err");
  }
};

window.deleteTeam = async function(id) {
  if (confirm("Vuoi davvero eliminare questa squadra?")) {
    try {
      await set(ref(db, 'teams/' + id), null);
      toast("Squadra eliminata.", "ok");
    } catch (err) {
      toast("Errore nell'eliminazione", "err");
    }
  }
};

window.releasePlayer = async function(playerId) {
  const giocatore = PLAYERS.find(p => p.id === playerId);
  if (!giocatore) return;
  if (confirm(`Vuoi svincolare ${giocatore.name}?`)) {
    try {
      await update(ref(db, 'players/' + playerId), { teamId: null });
      toast(`${giocatore.name} svincolato.`, 'ok');
    } catch (err) {
      toast("Errore durante lo svincolo", "err");
    }
  }
};

window.assignPlayerToTeam = async function() {
  const pId = document.getElementById('mPlayerSelect').value;
  const tId = document.getElementById('mTeamSelect').value;
  if (!pId || !tId) return toast("Seleziona sia un giocatore che una squadra!", "err");
  try {
    await update(ref(db, 'players/' + pId), { teamId: tId });
    toast("Giocatore assegnato con successo!", "ok");
  } catch (err) {
    toast("Errore durante l'assegnazione", "err");
  }
};

window.saveRankRow = async function(id) {
  const pts = parseFloat(document.getElementById('rk-pts-' + id).value) || 0;
  const lgw = parseFloat(document.getElementById('rk-lgw-' + id).value) || 0;
  const w   = parseInt(document.getElementById('rk-w-' + id).value) || 0;
  const d   = parseInt(document.getElementById('rk-d-' + id).value) || 0;
  const l   = parseInt(document.getElementById('rk-l-' + id).value) || 0;
  try {
    await update(ref(db, 'teams/' + id), { pts, lastGW: lgw, w, d, l });
    toast('Classifica di squadra aggiornata globalmente!', 'ok');
  } catch (err) {
    toast('Errore nel salvataggio della classifica', 'err');
  }
};

window.syncSofaScoreVotes = async function() {
  const tId  = document.getElementById('sofaTournId').value;
  const gwNum = document.getElementById('sofaGwNum').value;
  const log  = document.getElementById('syncLog');
  if (log) log.innerHTML = "Avvio sincronizzazione... Richiesta API in corso...<br>";
  try {
    const url = `https://api.sofascore.com/api/v1/unique-tournament/${tId}/season/52357/events`;
    if (log) log.innerHTML += `URL: ${url}<br>Simulazione completata. Integrazione con i tuoi moduli reali...<br>`;
    toast("Sincronizzazione completata con successo!", "ok");
  } catch (e) {
    if (log) log.innerHTML += `Errore: ${e.message}<br>`;
    toast("Errore durante il sync", "err");
  }
};

window.toggleCompFields = function(type) {
  const fg = document.getElementById('fieldGironi');
  const fq = document.getElementById('fieldQualificati');
  if (!fg || !fq) return;
  fg.style.display = (type === 'campionato' || type === 'misto') ? 'block' : 'none';
  fq.style.display = (type === 'misto') ? 'block' : 'none';
};

window.creaCompetizione = async function() {
  const idInput   = document.getElementById('compId');
  const nameInput = document.getElementById('compName');
  if (!idInput || !nameInput) return;

  const id   = idInput.value.trim().toLowerCase().replace(/\s+/g, '-');
  const name = nameInput.value.trim();
  const type = document.getElementById('compType').value;
  const gironi      = parseInt(document.getElementById('compGironi').value) || 1;
  const qualificati = parseInt(document.getElementById('compQualificati').value) || 0;

  if (!id || !name) return toast("ID e Nome Competizione sono obbligatori!", "err");

  const compPayload = { id, name, type, status: { currentGW: 1 }, marketOpen: true, fixtures: {}, teams: {}, standings: {} };
  if (type === 'campionato' || type === 'misto') compPayload.gironi = gironi;
  if (type === 'misto') compPayload.qualificatiFaseFinale = qualificati;

  try {
    await set(ref(db, `competitions/${id}`), compPayload);
    toast(`Competizione "${name}" creata con successo!`, "ok");
    idInput.value = '';
    nameInput.value = '';
  } catch (err) {
    toast("Errore durante la creazione", "err");
  }
};

window.generateRandomCalendar = async function() {
  if (TEAMS.length < 2) return toast("Servono almeno 2 squadre!", "err");

  const totalGwsRequested = parseInt(document.getElementById('genTotalGws').value) || 33;
  const rotationType = document.getElementById('genRotationType').value;

  if (!confirm(`Vuoi sovrascrivere il calendario di "${window.CURRENT_COMPETITION.toUpperCase()}" con ${totalGwsRequested} giornate?`)) return;

  let lista = TEAMS.map(t => t.id).sort(() => Math.random() - 0.5);
  if (lista.length % 2 !== 0) lista.push("RIPOSO");

  const numSquadre = lista.length;
  const matchPerGiornata = numSquadre / 2;
  const turniUnici = numSquadre - 1;
  let calendarioCompleto = {};

  for (let g = 1; g <= totalGwsRequested; g++) {
    const gironeCorrente = Math.floor((g - 1) / turniUnici);
    const turnoNelGirone = (g - 1) % turniUnici;
    const inverti = (rotationType === 'andata-ritorno' && gironeCorrente % 2 !== 0);
    let matchGiornata = {};
    let counter = 1;

    for (let m = 0; m < matchPerGiornata; m++) {
      let casaIdx = (turnoNelGirone + m) % (numSquadre - 1);
      let trasfIdx = m === 0 ? numSquadre - 1 : (numSquadre - 1 - m + turnoNelGirone) % (numSquadre - 1);
      let idCasa = lista[casaIdx];
      let idTrasf = lista[trasfIdx];
      if (idCasa === "RIPOSO" || idTrasf === "RIPOSO") continue;
      if (inverti) { const tmp = idCasa; idCasa = idTrasf; idTrasf = tmp; }
      matchGiornata[`m${counter++}`] = { id: `m${counter - 1}`, homeId: idCasa, awayId: idTrasf, homeScore: null, awayScore: null, finished: false };
    }
    calendarioCompleto[`gw${g}`] = matchGiornata;
  }

  try {
    await set(ref(db, `competitions/${window.CURRENT_COMPETITION}/matches`), calendarioCompleto);
    await set(ref(db, `competitions/${window.CURRENT_COMPETITION}/status`), { currentGW: 1 });
    toast(`🎯 Calendario generato per ${window.CURRENT_COMPETITION.toUpperCase()}!`, "ok");
  } catch (err) {
    toast("Errore durante il salvataggio del calendario", "err");
  }
};

/* ─── Toast helper ──────────────────────────────────────────────────────── */
function toast(msg, type = "ok") {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
